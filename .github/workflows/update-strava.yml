name: Update Strava activities

on:
  schedule:
    - cron: '17 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-strava:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Strava activities
        run: node scripts/update-strava.js
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

      - name: Store rotated Strava refresh token
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.STRAVA_SECRET_PAT }}
        run: |
          if [ -s .strava-refresh-token ]; then
            if [ -z "$GH_TOKEN" ]; then
              echo "::warning::Strava returned a new refresh token, but STRAVA_SECRET_PAT is not set. Add this secret so future monthly runs can update STRAVA_REFRESH_TOKEN automatically."
            else
              gh secret set STRAVA_REFRESH_TOKEN < .strava-refresh-token
              rm .strava-refresh-token
            fi
          fi

      - name: Commit Strava data
        shell: bash
        run: |
          if git diff --quiet data/strava.json; then
            echo "No Strava activity changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/strava.json
            git commit -m "Update Strava activities"
            git push
          fi
